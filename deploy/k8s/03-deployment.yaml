apiVersion: apps/v1
kind: Deployment
metadata:
  name: threatail-node
  namespace: threatail
  labels:
    app.kubernetes.io/name: threatail-node
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: threatail-node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: threatail-node
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: threatail-node
          image: ghcr.io/threatailwaf/threatail-node:latest
          imagePullPolicy: IfNotPresent
          args: ["/etc/threatail/config.json"]
          ports:
            - { name: http,    containerPort: 8080 }
            - { name: https,   containerPort: 8443 }
            - { name: metrics, containerPort: 9100 }
          # Cloud mode is entirely optional. Leave this commented out and the
          # node runs standalone from the ConfigMap above.
          # env:
          #   - name: THREATAIL_CLOUD_URL
          #     value: https://lk.threatail.com
          #   - name: THREATAIL_ENROLLMENT_TOKEN
          #     valueFrom:
          #       secretKeyRef: { name: threatail-cloud, key: enrollment-token }
          volumeMounts:
            - { name: config, mountPath: /etc/threatail, readOnly: true }
            - { name: state,  mountPath: /var/lib/threatail }
          readinessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap: { name: threatail-config }
        # The anomaly profile lives here. emptyDir means each pod learns its own
        # profile and loses it on restart. For a stable profile across restarts,
        # switch to a PersistentVolumeClaim (see deploy/k8s/README.md).
        - name: state
          emptyDir: {}
