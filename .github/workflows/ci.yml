name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # cargo audit against a changing advisory DB, so run it even without commits
    - cron: '0 6 * * 1'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Pinned on purpose. With @stable, every Rust release adds new clippy lints
      # and turns CI red with no commit of ours — which reads as a broken project
      # to anyone opening their first pull request. Bump this deliberately.
      - uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

      - name: Release build
        run: cargo build --release

  # Runs against current stable so new lints surface early, but does not gate
  # merges: a warning from a compiler released yesterday is not a broken PR.
  stable:
    name: Latest stable (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets
      - name: Test
        run: cargo test --all

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # full history, so a credential added in an older commit is still caught
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
